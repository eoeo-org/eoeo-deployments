apiVersion: apps/v1
kind: Deployment
metadata:
  name: twibot-to-discord
  labels:
    app: twibot-to-discord
spec:
  replicas: 1
  selector:
    matchLabels:
      app: twibot-to-discord
  template:
    metadata:
      labels:
        app: twibot-to-discord
    spec:
      containers:
        - name: twibot-to-discord
          image: ghcr.io/eoeo-org/twibot-to-discord:main@sha256:9eb651fe2d8e27ac750f54c7c4201bec6053f291fe343b2e0392dff1fcdf523a
          imagePullPolicy: IfNotPresent # because digest pinning
          env:
            - name: ADMIN
              value: "923158679006625802,325222935612620800,615059426369339392"
          envFrom:
            - secretRef:
                name: ttd-secrets
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 65532
            seccompProfile:
              type: RuntimeDefault
      tolerations:
        - key: "low-spec"
          operator: "Equal"
          value: "E2.1.Micro"
          effect: "NoExecute"
        - effect: NoExecute
          key: agent
          operator: Exists
